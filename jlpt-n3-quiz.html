<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT N3 練習問題</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Sawarabi+Mincho&display=swap');

  :root {
    --sakura-pink: #f9b8cc;
    --deep-pink: #e8648e;
    --petal: #fde0ea;
    --ink: #2c1a2e;
    --muted: #7a6070;
    --gold: #c9924b;
    --correct: #3aaa7a;
    --wrong: #e05a5a;
    --bg: #fdf6f9;
    --card: #fff8fb;
    --border: #f0d0dc;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* SAKURA CANVAS */
  #sakura-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  .header {
    position: relative;
    z-index: 10;
    background: linear-gradient(135deg, #fce4ef 0%, #fff0f5 50%, #fce4ef 100%);
    border-bottom: 2px solid var(--border);
    padding: 18px 24px;
    text-align: center;
    box-shadow: 0 2px 12px rgba(232,100,142,0.1);
  }
  .header h1 {
    font-family: 'Sawarabi Mincho', serif;
    font-size: clamp(1.3rem, 4vw, 2rem);
    color: var(--deep-pink);
    letter-spacing: 3px;
  }
  .header p { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }

  /* PROGRESS BAR */
  .progress-wrap {
    position: sticky;
    top: 0;
    z-index: 20;
    background: rgba(253,246,249,0.95);
    backdrop-filter: blur(6px);
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .progress-bar-track {
    flex: 1;
    height: 8px;
    background: var(--petal);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--deep-pink), var(--gold));
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .progress-text { font-size: 0.8rem; color: var(--muted); white-space: nowrap; }

  /* TIMER */
  .timer-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--deep-pink);
    min-width: 80px;
    justify-content: center;
  }

  /* MAIN */
  .main { position: relative; z-index: 5; max-width: 820px; margin: 0 auto; padding: 24px 16px 60px; }

  /* SECTION TITLE */
  .section-title {
    font-family: 'Sawarabi Mincho', serif;
    font-size: 1.15rem;
    color: var(--deep-pink);
    border-left: 4px solid var(--deep-pink);
    padding-left: 12px;
    margin: 32px 0 16px;
    letter-spacing: 1px;
  }
  .section-title small { font-size: 0.75rem; color: var(--muted); font-family: 'Noto Sans JP', sans-serif; letter-spacing: 0; margin-left: 8px; }

  /* QUESTION CARD */
  .q-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 20px 22px;
    margin-bottom: 14px;
    box-shadow: 0 2px 8px rgba(232,100,142,0.06);
    transition: box-shadow 0.2s;
  }
  .q-card:hover { box-shadow: 0 4px 16px rgba(232,100,142,0.12); }
  .q-num {
    display: inline-block;
    background: var(--deep-pink);
    color: white;
    font-size: 0.75rem;
    font-weight: 700;
    border-radius: 20px;
    padding: 2px 10px;
    margin-bottom: 10px;
    letter-spacing: 1px;
  }
  .q-text {
    font-size: 1rem;
    line-height: 1.8;
    margin-bottom: 14px;
    color: var(--ink);
  }
  .q-text u { text-decoration: underline; text-decoration-color: var(--deep-pink); }

  /* OPTIONS */
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  @media(max-width:500px){ .options { grid-template-columns: 1fr; } }

  .opt-btn {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    text-align: left;
    cursor: pointer;
    font-size: 0.9rem;
    color: var(--ink);
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .opt-btn:hover:not(:disabled) {
    border-color: var(--deep-pink);
    background: var(--petal);
    transform: translateY(-1px);
  }
  .opt-btn .opt-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px; height: 22px;
    background: var(--petal);
    border-radius: 50%;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--deep-pink);
    flex-shrink: 0;
  }
  .opt-btn.selected { border-color: #9a8af0; background: #f0eeff; }
  .opt-btn.correct  { border-color: var(--correct); background: #eafaf4; }
  .opt-btn.wrong    { border-color: var(--wrong);   background: #fff0f0; }
  .opt-btn:disabled { cursor: default; }
  .opt-btn.correct .opt-num { background: var(--correct); color: white; }
  .opt-btn.wrong   .opt-num { background: var(--wrong);   color: white; }

  /* EXPLANATION */
  .explanation {
    margin-top: 14px;
    background: linear-gradient(135deg, #fffbf0, #fff8fb);
    border: 1.5px solid #f0d8c0;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 0.85rem;
    line-height: 1.8;
    color: var(--ink);
    display: none;
  }
  .explanation.show { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
  .explanation .correct-ans { color: var(--correct); font-weight: 700; font-size: 0.95rem; }
  .explanation .why { color: var(--muted); margin-top: 6px; }
  .explanation .trans { color: #7760a0; margin-top: 6px; font-style: italic; }

  /* SUBMIT / RESULT */
  .btn-submit {
    display: block;
    width: 100%;
    max-width: 340px;
    margin: 32px auto 0;
    padding: 14px 0;
    background: linear-gradient(135deg, var(--deep-pink), #c9556e);
    color: white;
    font-size: 1.05rem;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(232,100,142,0.35);
    letter-spacing: 2px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(232,100,142,0.45); }
  .btn-submit:disabled { opacity: 0.5; cursor: default; transform: none; }

  /* RESULT */
  .result-box {
    display: none;
    text-align: center;
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 32px 24px;
    margin-top: 32px;
  }
  .result-box.show { display: block; animation: fadeIn 0.5s ease; }
  .result-score { font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 700; color: var(--deep-pink); line-height: 1; }
  .result-total { font-size: 1rem; color: var(--muted); margin-top: 6px; }
  .result-time { font-size: 0.95rem; color: var(--gold); margin-top: 8px; font-weight: 600; }
  .result-msg { font-size: 1.1rem; margin-top: 16px; color: var(--ink); }
  .btn-retry {
    margin-top: 20px;
    padding: 12px 36px;
    background: white;
    border: 2px solid var(--deep-pink);
    color: var(--deep-pink);
    font-weight: 700;
    font-size: 0.95rem;
    font-family: 'Noto Sans JP', sans-serif;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-retry:hover { background: var(--deep-pink); color: white; }

  /* INTRO */
  .intro-screen {
    position: fixed; inset: 0;
    z-index: 100;
    background: linear-gradient(160deg, #fce4ef 0%, #fff0f8 60%, #fde8d8 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    gap: 16px;
  }
  .intro-screen h1 {
    font-family: 'Sawarabi Mincho', serif;
    font-size: clamp(1.8rem, 6vw, 3rem);
    color: var(--deep-pink);
    letter-spacing: 4px;
  }
  .intro-screen p { color: var(--muted); font-size: 0.95rem; max-width: 480px; line-height: 1.8; }
  .intro-screen .sakura-deco { font-size: 3rem; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .btn-start {
    margin-top: 8px;
    padding: 16px 52px;
    background: linear-gradient(135deg, var(--deep-pink), #c9556e);
    color: white;
    font-size: 1.1rem;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(232,100,142,0.4);
    letter-spacing: 3px;
    transition: transform 0.15s;
  }
  .btn-start:hover { transform: scale(1.04); }

  .stats-row { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
  .stat-item { text-align: center; }
  .stat-item .num { font-size: 1.6rem; font-weight: 700; color: var(--deep-pink); }
  .stat-item .lbl { font-size: 0.75rem; color: var(--muted); }
</style>
</head>
<body>

<canvas id="sakura-canvas"></canvas>

<!-- INTRO SCREEN -->
<div class="intro-screen" id="introScreen">
  <div class="sakura-deco">🌸</div>
  <h1>JLPT N3 練習問題</h1>
  <p>Đề luyện thi JLPT N3 — Văn tự · Từ vựng · Ngữ pháp · Đọc hiểu<br>Sau khi chọn đáp án sẽ hiện giải thích chi tiết bằng tiếng Việt.</p>
  <div class="stats-row">
    <div class="stat-item"><div class="num">70</div><div class="lbl">câu hỏi</div></div>
    <div class="stat-item"><div class="num">⏱</div><div class="lbl">đếm giờ tự do</div></div>
    <div class="stat-item"><div class="num">N3</div><div class="lbl">cấp độ</div></div>
  </div>
  <button class="btn-start" onclick="startQuiz()">始める ✿</button>
</div>

<!-- PROGRESS -->
<div class="progress-wrap" id="progressWrap" style="display:none">
  <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
  <span class="progress-text" id="progressText">0 / 70</span>
  <div class="timer-badge" id="timerBadge">⏱ 00:00</div>
</div>

<!-- HEADER -->
<div class="header" id="mainHeader" style="display:none">
  <h1>🌸 JLPT N3 練習問題 🌸</h1>
  <p>Chọn đáp án — đọc giải thích — học thêm !</p>
</div>

<div class="main" id="mainContent" style="display:none"></div>

<script>
// ============================================================
// DATA
// ============================================================
const questions = [
  // ===== 文字・語彙 問題1 (1-8) =====
  {id:1,section:"言語知識 (文字・語彙) 問題１：漢字の読み方",
   q:"彼女は３人姉妹の<u>長女</u>だ。",
   opts:["ちょうじょう","ちょしょう","ちょうじょ","ちょしょ"],
   ans:2,
   trans:"Cô ấy là con gái cả trong ba chị em gái.",
   why:"長女（ちょうじょ）= con gái cả. 長（ちょう）+ 女（じょ）— cách đọc âm Hán.",
   wrongs:["ちょうじょう không đúng âm của 女","ちょしょう sai cả hai âm","ちょしょ sai âm 長"]},
  {id:2,section:"言語知識 (文字・語彙) 問題１：漢字の読み方",
   q:"これは<u>偽物</u>のダイヤモンドだ。",
   opts:["にせぶつ","にせもの","ぎぶつ","ぎもつ"],
   ans:1,
   trans:"Đây là kim cương giả.",
   why:"偽物（にせもの）= hàng giả. 偽（にせ）đọc theo âm Nhật thuần, 物（もの）cũng vậy. Đây là từ thuần Nhật.",
   wrongs:["にせぶつ sai — 物 đọc là もの không phải ぶつ khi ghép với にせ","ぎぶつ/ぎもつ dùng âm Hán của 偽（ぎ）nhưng cả từ lại là thuần Nhật"]},
  {id:3,section:"言語知識 (文字・語彙) 問題１：漢字の読み方",
   q:"旅行で一週間家を<u>留守</u>にした。",
   opts:["りゅうしゅ","りゅうす","るしゅ","るす"],
   ans:3,
   trans:"Tôi đã đi du lịch và để nhà trống cả một tuần.",
   why:"留守（るす）= vắng nhà, nhà trống. Đây là từ thuần âm Nhật. 留（る）＋守（す）.",
   wrongs:["りゅうしゅ/りゅうす dùng âm Hán 留（りゅう）là sai","るしゅ sai âm 守"]},
  {id:4,section:"言語知識 (文字・語彙) 問題１：漢字の読み方",
   q:"フランス語の<u>初級</u>コースは８月に終わる。",
   opts:["しょきゅう","じょきゅう","はつきゅう","しょうきゅう"],
   ans:0,
   trans:"Khóa học tiếng Pháp trình độ cơ bản sẽ kết thúc vào tháng 8.",
   why:"初級（しょきゅう）= cấp độ cơ bản/sơ cấp. 初（しょ）＋級（きゅう）.",
   wrongs:["じょきゅう âm じょ không đúng cho 初","はつきゅう nhầm 初 với âm はつ (dùng trong 初めて)","しょうきゅう thêm âm う dài không đúng"]},
  {id:5,section:"言語知識 (文字・語彙) 問題１：漢字の読み方",
   q:"今回の試合は絶対<u>勝</u>たなければならない。",
   opts:["もたなければ","またなければ","かたなければ","たたなければ"],
   ans:2,
   trans:"Trận đấu lần này nhất định phải thắng.",
   why:"勝つ（かつ）= thắng. Dạng phủ định: 勝たない (かたない). Âm く→か trước た.",
   wrongs:["もつ = cầm/nắm，またつ/たたつ đều không có nghĩa trong văn cảnh này"]},
  {id:6,section:"言語知識 (文字・語彙) 問題１：漢字の読み方",
   q:"京都を<u>経て</u>大阪へ行く。",
   opts:["たて","へて","して","けて"],
   ans:1,
   trans:"Đi qua Kyoto rồi đến Osaka.",
   why:"経る（へる）= đi qua, trải qua. 経て là dạng て形. Chú ý: 経 có thể đọc けい (âm Hán) nhưng ở đây là âm Nhật thuần へる.",
   wrongs:["たて là 建てる/立てる","して là する","けて không phải cách đọc đúng của 経て"]},
  {id:7,section:"言語知識 (文字・語彙) 問題１：漢字の読み方",
   q:"煙が空に<u>消える</u>。",
   opts:["きえる","たえる","こえる","うえる"],
   ans:0,
   trans:"Khói tan biến vào bầu trời.",
   why:"消える（きえる）= tan biến, tắt, mất đi.",
   wrongs:["たえる = chịu đựng / tuyệt chủng","こえる = vượt qua","うえる = trồng cây / đói khát"]},
  {id:8,section:"言語知識 (文字・語彙) 問題１：漢字の読み方",
   q:"夏休みは<u>田舎</u>の実家に帰る予定だ。",
   opts:["たしゃ","けしき","てんか","いなか"],
   ans:3,
   trans:"Mùa hè tôi dự định về nhà cha mẹ ở quê.",
   why:"田舎（いなか）= nông thôn, miền quê. Đây là từ thuần Nhật đặc biệt, không đọc theo âm Hán.",
   wrongs:["たしゃ/けしき/てんか đều không liên quan đến cách đọc của 田舎"]},

  // ===== 問題2 (9-14) =====
  {id:9,section:"言語知識 (文字・語彙) 問題２：漢字の書き方",
   q:"日本のマンガに<u>きょうみ</u>があります。",
   opts:["教美","教見","興味","興見"],
   ans:2,
   trans:"Tôi có hứng thú với manga Nhật Bản.",
   why:"興味（きょうみ）= hứng thú, quan tâm. 興（きょう）= hứng khởi + 味（み）= vị/cảm giác. Cụm cố định: 興味がある.",
   wrongs:["教（きょう）có nghĩa là dạy/giáo dục, không phải hứng thú","美・見 đều không cho nghĩa 'sở thích'"]},
  {id:10,section:"言語知識 (文字・語彙) 問題２：漢字の書き方",
   q:"あの兄弟は性格がまったく<u>ちがいます</u>。",
   opts:["違います","遅います","達います","遺います"],
   ans:0,
   trans:"Hai anh em đó tính cách hoàn toàn khác nhau.",
   why:"違う（ちがう）= khác nhau. Hán tự 違 (ちがう/い) có bộ 辶 (di chuyển) thể hiện sự sai lệch.",
   wrongs:["遅い（おそい）= chậm","達（たつ）= đạt được","遺（い）= để lại, di sản"]},
  {id:11,section:"言語知識 (文字・語彙) 問題２：漢字の書き方",
   q:"つぎの信号で<u>うせつ</u>してください。",
   opts:["左折","左曲","右折","右曲"],
   ans:2,
   trans:"Hãy rẽ phải ở đèn tín hiệu tiếp theo.",
   why:"右折（うせつ）= rẽ phải. 右（う）= phải + 折（せつ）= gấp/rẽ. Ngược lại: 左折（させつ）= rẽ trái.",
   wrongs:["左折（させつ）là rẽ trái, không phải うせつ","曲 không dùng trong từ chỉ hướng rẽ xe"]},
  {id:12,section:"言語知識 (文字・語彙) 問題２：漢字の書き方",
   q:"父は仕事の<u>かんけい</u>でよく出張します。",
   opts:["関系","関係","間系","間係"],
   ans:1,
   trans:"Bố tôi thường xuyên đi công tác vì công việc.",
   why:"関係（かんけい）= mối quan hệ, liên quan. 関（かん）có bộ 門，係（けい）có người 亻 bên cạnh 糸.",
   wrongs:["関系 — 系 có thể đọc けい nhưng từ chuẩn viết là 係","間 (かん/ま) = khoảng cách, không phải 関 (liên quan)"]},
  {id:13,section:"言語知識 (文字・語彙) 問題２：漢字の書き方",
   q:"息子が公園でいろいろな形の<u>は</u>を集めてきました。",
   opts:["草","葉","菜","芽"],
   ans:1,
   trans:"Con trai tôi đã nhặt nhiều chiếc lá có hình dạng khác nhau ở công viên về.",
   why:"葉（は）= chiếc lá. Bộ 艹 (草かんむり) + 木 + 世. Đây là lá cây thật.",
   wrongs:["草（くさ）= cỏ","菜（な）= rau","芽（め）= mầm cây"]},
  {id:14,section:"言語知識 (文字・語彙) 問題２：漢字の書き方",
   q:"<u>きもの</u>をきて記念写真を撮る。",
   opts:["聞物","切物","来物","着物"],
   ans:3,
   trans:"Mặc kimono để chụp ảnh kỷ niệm.",
   why:"着物（きもの）= kimono (trang phục truyền thống Nhật). 着（き）= mặc + 物（もの）= đồ vật.",
   wrongs:["聞物 không tồn tại","切物 không đúng nghĩa","来物 không tồn tại trong tiếng Nhật"]},

  // ===== 問題3 (15-25) =====
  {id:15,section:"言語知識 (文字・語彙) 問題３：文脈規定",
   q:"駅で友だちと（　）家に帰りました。",
   opts:["あふれて","おぼれて","はずれて","わかれて"],
   ans:3,
   trans:"Tôi chia tay bạn bè ở ga rồi về nhà.",

  {id:21,section:"言語知識 (文字・語彙) 問題３：文脈規定",

   trans:"Điều tác giả đặc biệt nhấn mạnh là luyện cơ bắp.",
   why:"Bài: '特に筋肉トレーニングを勧めたい' = đặc biệt muốn khuyến nghị luyện cơ. Tản bộ và jogging chỉ là bước đệm.",
   wrongs:["Tản bộ, đi bộ nhanh, chạy bộ chỉ là các bước dẫn đến — không phải điều nhấn mạnh chính"]},
  {id:70,section:"読解 問題６：寒さに負けない体作り",
   q:"この文章で筆者が最も言いたいことは何か。",
   opts:["シャワーだけではなくお風呂にちゃんと入ろう。","体作りを通して、寒さを乗り切ろう。","バランスの取れた食事の重要性","筋肉トレーニングをインフルエンザとの関係"],
   ans:1,
   trans:"Điều tác giả muốn nói nhất là: Hãy vượt qua mùa lạnh bằng cách rèn luyện cơ thể.",
   why:"Tiêu đề và mở đầu: '寒さに負けない体作りの４つのコツ' = 4 bí quyết rèn thể lực chống rét. Toàn bài xoay quanh chủ đề này.",
   wrongs:["Câu 1 chỉ là 1 trong 4 mẹo","Câu 3 chỉ là 1 trong 4 mẹo","Câu 4 là chi tiết phụ, không phải thông điệp chính"]}
];

// ============================================================
// STATE
// ============================================================
let currentQ = 0;
let score = 0;
let answered = new Array(questions.length).fill(false);
let timerInterval = null;
let elapsedSeconds = 0;
let quizStarted = false;
let quizFinished = false;

// ============================================================
// SAKURA
// ============================================================
const canvas = document.getElementById('sakura-canvas');
const ctx = canvas.getContext('2d');
let petals = [];

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function createPetal(){
  return {
    x: Math.random() * canvas.width,
    y: -20,
    size: Math.random()*8+4,
    speed: Math.random()*1.5+0.5,
    swing: Math.random()*2-1,
    angle: Math.random()*Math.PI*2,
    angleSpeed: (Math.random()-0.5)*0.05,
    opacity: Math.random()*0.6+0.3
  };
}

function drawPetal(p){
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.angle);
  ctx.globalAlpha = p.opacity;
  ctx.fillStyle = '#f9b8cc';
  ctx.beginPath();
  ctx.ellipse(0, 0, p.size, p.size*0.6, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function animateSakura(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(Math.random()<0.08) petals.push(createPetal());
  petals = petals.filter(p=>{
    p.y += p.speed;
    p.x += Math.sin(p.y*0.02)*p.swing;
    p.angle += p.angleSpeed;
    drawPetal(p);
    return p.y < canvas.height+30;
  });
  requestAnimationFrame(animateSakura);
}
animateSakura();

// ============================================================
// BUILD UI
// ============================================================
function startQuiz(){
  document.getElementById('introScreen').style.display='none';
  document.getElementById('progressWrap').style.display='flex';
  document.getElementById('mainHeader').style.display='block';
  document.getElementById('mainContent').style.display='block';
  quizStarted=true;
  renderAll();
  startStopwatch();
}

function renderAll(){
  const container = document.getElementById('mainContent');
  container.innerHTML='';
  let currentSection = '';
  questions.forEach((q,i)=>{
    if(q.section !== currentSection){
      currentSection = q.section;
      const st = document.createElement('div');
      st.className='section-title';
      const parts = q.section.split('：');
      st.innerHTML = parts[0]+(parts[1]?`<small>：${parts[1]}</small>`:'');
      container.appendChild(st);
    }
    container.appendChild(buildCard(q,i));
  });
  // Submit button
  const btn = document.createElement('button');
  btn.className='btn-submit';
  btn.id='btnSubmit';
  btn.textContent='採点する ✿';
  btn.onclick=submitAll;
  container.appendChild(btn);
  // Result
  const rb = document.createElement('div');
  rb.className='result-box';
  rb.id='resultBox';
  rb.innerHTML=`<div class="result-score" id="resultScore">0</div>
<div class="result-total" id="resultTotal">/ 70問</div>
<div class="result-time" id="resultTime">⏱ 00:00</div>
<div class="result-msg" id="resultMsg"></div>
<button class="btn-retry" onclick="location.reload()">もう一度 🌸</button>`;
  container.appendChild(rb);
}

function buildCard(q, idx){
  const card = document.createElement('div');
  card.className='q-card';
  card.id=`card-${idx}`;
  card.innerHTML=`<span class="q-num">問 ${q.id}</span>
<div class="q-text">${q.q.replace(/\n/g,'<br>')}</div>
<div class="options" id="opts-${idx}"></div>
<div class="explanation" id="exp-${idx}"></div>`;
  const optsDiv = card.querySelector(`#opts-${idx}`);
  q.opts.forEach((opt,oi)=>{
    const btn = document.createElement('button');
    btn.className='opt-btn';
    btn.id=`opt-${idx}-${oi}`;
    btn.innerHTML=`<span class="opt-num">${oi+1}</span><span>${opt}</span>`;
    btn.onclick=()=>selectAnswer(idx, oi, q);
    optsDiv.appendChild(btn);
  });
  return card;
}

// ============================================================
// ANSWER
// ============================================================
function selectAnswer(qIdx, optIdx, q){
  if(answered[qIdx]) return;
  answered[qIdx]=true;
  const isCorrect = optIdx === q.ans;
  if(isCorrect) score++;
  // Color buttons
  for(let i=0;i<q.opts.length;i++){
    const b = document.getElementById(`opt-${qIdx}-${i}`);
    b.disabled=true;
    if(i===q.ans) b.classList.add('correct');
    else if(i===optIdx && !isCorrect) b.classList.add('wrong');
  }
  // Show explanation
  showExplanation(qIdx, q, isCorrect);
  updateProgress();
}

function showExplanation(qIdx, q, isCorrect){
  const exp = document.getElementById(`exp-${qIdx}`);
  let wrongHints = '';
  if(q.wrongs){
    wrongHints='<div class="why"><b>Lý do các đáp án sai:</b><br>'+q.wrongs.map((w,i)=>{
      const label = ['１','２','３','４'][i==(q.ans)?-1:i];
      return `• ${w}`;
    }).join('<br>')+'</div>';
  }
  exp.innerHTML=`<div class="correct-ans">${isCorrect?'✅ Đúng rồi！':'❌ Sai！'} Đáp án đúng: ${q.ans+1}. ${q.opts[q.ans]}</div>
<div class="trans">🌸 Dịch nghĩa: ${q.trans}</div>
<div class="why">💡 Giải thích: ${q.why}</div>
${wrongHints}`;
  exp.classList.add('show');
}

// ============================================================
// STOPWATCH
// ============================================================
function startStopwatch(){
  clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    if(quizFinished) return;
    elapsedSeconds++;
    updateTimerBadge();
  }, 1000);
}

function formatTime(s){
  const m = Math.floor(s/60);
  const sec = s % 60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function updateTimerBadge(){
  const b = document.getElementById('timerBadge');
  b.textContent = `⏱ ${formatTime(elapsedSeconds)}`;
}

function scrollToCard(idx){
  const card=document.getElementById(`card-${idx}`);
  if(card) card.scrollIntoView({behavior:'smooth',block:'center'});
}

// ============================================================
// PROGRESS
// ============================================================
function updateProgress(){
  const done=answered.filter(Boolean).length;
  const pct=done/questions.length*100;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressText').textContent=`${done} / ${questions.length}`;
}

// ============================================================
// SUBMIT
// ============================================================
function submitAll(){
  quizFinished = true;
  clearInterval(timerInterval);
  // Mark unanswered questions as skipped (show correct answer without penalizing click)
  questions.forEach((q,i)=>{
    if(!answered[i]){
      answered[i]=true;
      for(let j=0;j<q.opts.length;j++){
        const b=document.getElementById(`opt-${i}-${j}`);
        b.disabled=true;
        if(j===q.ans) b.classList.add('correct');
      }
      showExplanation(i,q,false);
    }
  });
  updateProgress();
  document.getElementById('btnSubmit').style.display='none';
  const rb=document.getElementById('resultBox');
  rb.classList.add('show');
  document.getElementById('resultScore').textContent=score;
  const pct=Math.round(score/questions.length*100);
  let msg='';
  if(pct>=90) msg='🌸 Xuất sắc！素晴らしい！ Bạn đã nắm vững kiến thức N3!';
  else if(pct>=70) msg='✨ Tốt lắm！よくできました！ Cố thêm một chút nữa nhé!';
  else if(pct>=50) msg='💪 Cần ôn tập thêm！もう少し！ Hãy xem lại phần giải thích!';
  else msg='📚 Hãy ôn tập nhiều hơn！また頑張って！ Đừng nản lòng nhé 🌸';
  document.getElementById('resultMsg').textContent=msg;
  document.getElementById('resultTime').textContent=`⏱ Thời gian làm bài: ${formatTime(elapsedSeconds)}`;
  rb.scrollIntoView({behavior:'smooth',block:'center'});
}
</script>
</body>
